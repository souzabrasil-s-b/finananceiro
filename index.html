<style>
  :root[data-theme="escuro"] {
    --bg:#10241F; --panel:#17332C; --panel2:#1D3B32; --paper:#F3ECD9; --paperDim:#C9C2AC;
    --gold:#CBA135; --rust:#B5573A; --green:#4F9D69; --line:#2A4A40; --inputBg:#0E1F1A; --btnText:#10241F;
  }
  :root[data-theme="azul"] {

    --gold:#2E7DBE; --rust:#C0564B; --green:#2E9E70; --line:#CFE3F3; --inputBg:#F3F9FF; --btnText:#FFFFFF;
  }
  :root[data-theme="rosa"] {
    --bg:#FDF1F5; --panel:#FFFFFF; --panel2:#FFF6F9; --paper:#4A2436; --paperDim:#9C7684;
    --gold:#C9944F; --rust:#D9678C; --green:#3F9C7C; --line:#F4D9E3; --inputBg:#FFF6F9; --btnText:#FFFFFF;
  }
  :root[data-theme="neon"] {
    --bg:#0D0221; --panel:#170B3B; --panel2:#1F1050; --paper:#00F5FF; --paperDim:#B48CFF;
    --gold:#FFD60A; --rust:#FF206E; --green:#05FFA1; --line:#3A1E6D; --inputBg:#170B3B; --btnText:#0D0221;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; background:var(--bg); color:var(--paper); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono { font-family:'JetBrains Mono',monospace; }
  .serif { font-family:'Fraunces',serif; }
  header {
    padding:24px 20px 16px; border-bottom:1px solid var(--line);
  }
  .header-inner, .tabs, main { max-width:900px; margin:0 auto; }
  .header-inner { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:28px; margin:0; color:var(--paper); }
  .subtitle { font-size:12px; color:var(--paperDim); margin-top:4px; }
  .saved-pill {
    font-size:11px; padding:4px 10px; border-radius:999px; border:1px solid var(--green); color:var(--green);
    font-family:'JetBrains Mono',monospace; white-space:nowrap;
  }
  .theme-switch { display:flex; align-items:center; gap:6px; margin-top:8px; justify-content:flex-end; }

  }
  .tab-btn.active { background:var(--gold); color:var(--btnText); font-weight:600; }
  main { padding:24px 20px 80px; display:flex; flex-direction:column; gap:24px; }
  .card {
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;

  .eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); font-family:'JetBrains Mono',monospace; margin:0 0 4px; }

  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }

  @media(min-width:640px){ .teach-grid { grid-template-columns:1fr 1fr; } }
  .teach-card-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .teach-icon { width:32px; height:32px; border-radius:999px; background:color-mix(in srgb, var(--gold) 15%, transparent); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .teach-title { font-size:14px; font-weight:600; color:var(--paper); margin:0; }
  .teach-text { font-size:12px; color:var(--paperDim); line-height:1.55; margin:0; }

  table { width:100%; border-collapse:collapse; font-size:12px; color:var(--paper); }
  th { text-align:left; padding-bottom:8px; padding-right:12px; color:var(--paperDim); font-weight:500; }
  td { padding:8px 12px 8px 0; border-top:1px solid var(--line); }
  tfoot td { border-top:2px solid var(--gold); font-weight:600; }
  .table-wrap { overflow-x:auto; }

  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:flex-end; justify-content:center;
    padding:0; z-index:50;
  }
  @media(min-width:640px){ .modal-overlay{ align-items:center; padding:16px; } }
  .modal-overlay.hidden { display:none; }
  .modal {
    width:100%; max-width:440px; background:var(--panel2); border:1px solid var(--line);
    border-radius:18px 18px 0 0; padding:20px;
  }
  @media(min-width:640px){ .modal{ border-radius:18px; } }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .modal-header h3 { font-family:'Fraunces',serif; font-size:18px; margin:0; color:var(--paper); }
  .modal-close { background:none; border:none; color:var(--paperDim); font-size:18px; cursor:pointer; }
  .hint { font-size:11px; color:var(--paperDim); margin:0; }

  .chart-box { position:relative; height:230px; }
  .chart-title { font-size:13px; color:var(--paperDim); margin:0 0 12px; }

  .highlight-card { border:1.5px solid var(--gold); background:var(--panel2); }
  .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>

<script>
/* =========================================================
   Faxina de cache antigo — roda ANTES de tudo, uma ÚNICA vez
   por aparelho, para garantir que nenhuma versão velha
   (cacheada pelo Service Worker) seja exibida sem a tela de
   senha. Depois dessa limpeza única, o cache normal do PWA
   volta a funcionar (inclusive offline).
========================================================= */
(function() {
  var CLEANUP_FLAG = "livrocaixa:cacheCleanupV1";
  if (localStorage.getItem(CLEANUP_FLAG)) return; // já limpou antes, não repete
  localStorage.setItem(CLEANUP_FLAG, "1");

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    }).catch(()=>{});
  }
  if (window.caches && caches.keys) {
    caches.keys().then(names => {
      names.forEach(name => caches.delete(name));
    }).catch(()=>{});
  }
})();
</script>

<div id="lockScreen" style="position:fixed; inset:0; z-index:99999; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px;">

<script>
/* =========================================================
   Estado e persistência (localStorage)
========================================================= */
const STORAGE_KEY = "livrocaixa:v1";
const THEME_KEY = "livrocaixa:tema";

const uid = () => Math.random().toString(36).slice(2, 10);
const todayISO = () => new Date().toISOString().slice(0, 10);
const brl = (n) => (isNaN(n) ? 0 : n).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const monthKey = (iso) => iso.slice(0, 7);
const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const monthLabel = (iso) => { const [y,m] = iso.split("-"); return `${MESES[parseInt(m,10)-1]}/${y.slice(2)}`; };
const dateBR = (iso) => { const [y,m,d] = iso.split("-"); return `${d}/${m}/${y}`; };
const isDizimo = (cat) => /d[íi]zimo/i.test(cat || "");
const iconeDivida = (tipo) => tipo === "carro" ? "🚗" : tipo === "compras" ? "🛒" : "🧾";

const DESPESAS_FIXAS_PADRAO = [
  { nome: "Internet", valor: 130 },
  { nome: "Telefonia", valor: 150 },
  { nome: "Gasolina", valor: 600 },
  { nome: "Academia", valor: 220 },
  { nome: "Educação", valor: 150 },
  { nome: "Streaming", valor: 100 },
  { nome: "Cabeleireiro", valor: 140 },
  { nome: "Seguro", valor: 60 },
  { nome: "Rondônia", valor: 200 },
  { nome: "Transporte", valor: 500 },
  { nome: "Pensão", valor: 300 },
  { nome: "Aluguel ponto", valor: 400 },
];

function defaultData() {
  return {
    transactions: [],
    patrimonio: { poupanca: [], tesouro: [] },
    dividas: [
      { id: uid(), nome: "Carro", tipo: "carro", valor: 1500, parcelasRestantes: 0 },
      { id: uid(), nome: "Compras do mês", tipo: "compras", valor: 3000, parcelasRestantes: 0 },
      ...DESPESAS_FIXAS_PADRAO.map(item => ({ id: uid(), nome: item.nome, tipo: "fixa", valor: item.valor, parcelasRestantes: 0 })),
    ],
  };
}

/* =========================================================
   Firebase (Realtime Database) — sincronização entre aparelhos
   Login anônimo: sem senha, sem tela de login, só protege o banco
   de acesso externo (regras exigem auth != null).
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyD2QvlTbQqWgTFChPZ-1cWSrwIqh30Zvio",
  authDomain: "financeiro-oficial.firebaseapp.com",
  databaseURL: "https://financeiro-oficial-default-rtdb.firebaseio.com",
  projectId: "financeiro-oficial",
  storageBucket: "financeiro-oficial.firebasestorage.app",
  messagingSenderId: "116416068012",
  appId: "1:116416068012:web:b90d7edcecd18e52e8a209",
};

firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.database();
const DB_PATH = "livrocaixa/dados"; // um único "documento" com todo o estado

let fbReady = false;      // true depois que autenticou E carregou os dados iniciais
let fbSyncTimer = null;   // debounce das gravações

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignora */ }
  return defaultData();
}

// Grava local na hora (rápido, funciona offline) e agenda envio ao Firebase.
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  if (!fbReady) return; // ainda não autenticou/carregou: não sobrescreve o banco
  clearTimeout(fbSyncTimer);
  fbSyncTimer = setTimeout(() => {
    fbDb.ref(DB_PATH).set(DATA).catch((err) => console.error("Erro ao sincronizar com Firebase:", err));
  }, 600); // espera 600ms de silêncio antes de enviar, evita gravar a cada tecla
}

// Ao autenticar, decide: se já existe dado no Firebase, usa ele (fonte da verdade
// entre aparelhos); se não existe ainda, sobe o que já está salvo localmente.
fbAuth.signInAnonymously().catch((err) => console.error("Erro na autenticação anônima:", err));

// O Realtime Database não guarda listas vazias (arrays sem itens somem do banco).
// Essa função garante que, ao carregar de volta, todo campo esperado exista,
// mesmo que esteja vazio — evita erro de "undefined" no restante do app.
function normalizeData(d) {
  d = d || {};
  d.transactions = Array.isArray(d.transactions) ? d.transactions : [];
  d.patrimonio = d.patrimonio || {};
  d.patrimonio.poupanca = Array.isArray(d.patrimonio.poupanca) ? d.patrimonio.poupanca : [];
  d.patrimonio.tesouro = Array.isArray(d.patrimonio.tesouro) ? d.patrimonio.tesouro : [];
  d.dividas = Array.isArray(d.dividas) ? d.dividas : [];
  return d;
}

fbAuth.onAuthStateChanged((user) => {
  if (!user) return;
  fbDb.ref(DB_PATH).once("value")
    .then((snap) => {
      const remoto = snap.val();
      if (remoto) {
        DATA = normalizeData(remoto);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      } else {
        DATA = normalizeData(DATA);
        fbDb.ref(DB_PATH).set(DATA).catch((err) => console.error("Erro ao subir dados iniciais:", err));
      }
      fbReady = true;
      ensureDespesasFixas();
      ensureValoresPadrao();
      const pill = document.getElementById("savedPill");
      if (pill) pill.textContent = "sincronizado ✓";
      render();
    })
    .catch((err) => console.error("Erro ao carregar dados do Firebase:", err));
});

// Garante que quem já tinha dados salvos também recebe as novas despesas fixas, sem duplicar nem apagar nada
function ensureDespesasFixas() {
  const existentes = new Set(DATA.dividas.map(d => d.nome.trim().toLowerCase()));
  let mudou = false;
  DESPESAS_FIXAS_PADRAO.forEach(item => {
    if (!existentes.has(item.nome.trim().toLowerCase())) {
      DATA.dividas.push({ id: uid(), nome: item.nome, tipo: "fixa", valor: item.valor, parcelasRestantes: 0 });
      mudou = true;
    }
  });
  if (mudou) saveData();
}

// Preenche Carro (1500) e Compras do mês (3000) automaticamente, só se ainda estiverem zerados
// (não sobrescreve se você já tiver editado o valor manualmente)
function ensureValoresPadrao() {
  let mudou = false;
  DATA.dividas.forEach(d => {
    if (d.nome.trim().toLowerCase() === "carro" && (!d.valor || d.valor === 0)) { d.valor = 1500; mudou = true; }
    if (d.nome.trim().toLowerCase() === "compras do mês" && (!d.valor || d.valor === 0)) { d.valor = 3000; mudou = true; }
  });
  if (mudou) saveData();
}

let DATA = loadData();
ensureDespesasFixas();
ensureValoresPadrao();
let THEME = localStorage.getItem(THEME_KEY) || "escuro";
let TAB = "visao";
let charts = {}; // instâncias Chart.js ativas, para destruir ao re-renderizar

const THEMES = {
  escuro: { label: "Livro-caixa", swatch: "#CBA135" },
  azul:   { label: "Azul claro",  swatch: "#2E7DBE" },
  rosa:   { label: "Rosa claro",  swatch: "#D9678C" },
  neon:   { label: "Escuro neon (letras coloridas)", swatch: "linear-gradient(135deg, #00F5FF, #FF206E, #FFD60A)" },
};

function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function todayFullLabel() {
  const d = new Date();
  const dia = String(d.getDate()).padStart(2, "0");
  const mesAbrev = MESES[d.getMonth()];
  const mes = mesAbrev.charAt(0).toUpperCase() + mesAbrev.slice(1);
  const ano = d.getFullYear();
  return `${dia} ${mes} ${ano}`;
}

function setTheme(key) {
  THEME = key;
  document.documentElement.setAttribute("data-theme", key);
  localStorage.setItem(THEME_KEY, key);
  renderThemeSwitch();
  render();
}

function renderThemeSwitch() {
  const el = document.getElementById("themeSwitch");
  el.innerHTML = `
    <span class="mono" style="font-size:11px; color:var(--paperDim); white-space:nowrap; margin-right:2px;">${todayFullLabel()}</span>
    ${Object.entries(THEMES).map(([key, val]) => `
      <button class="swatch ${THEME === key ? "active" : ""}" title="${val.label}"
        style="background:${val.swatch}" onclick="setTheme('${key}')"></button>
    `).join("")}
  `;
}

/* =========================================================
   Tabs
========================================================= */
const TABS = [
  { id: "visao", label: "Visão geral" },
  { id: "lancamentos", label: "Lançamentos" },
  { id: "patrimonio", label: "Patrimônio" },
  { id: "dividas", label: "Dívidas" },
  { id: "historico", label: "Histórico" },
  { id: "aprenda", label: "Aprenda" },
];

function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map(t => `
    <button class="tab-btn ${TAB === t.id ? "active" : ""}" onclick="setTab('${t.id}')">${t.label}</button>
  `).join("");
}
function setTab(id) { TAB = id; render(); }

/* =========================================================
   Cálculos derivados
========================================================= */
function computeAll() {
  const tx = DATA.transactions;
  const totalEntradas = tx.filter(x=>x.type==="entrada").reduce((s,x)=>s+x.amount,0);
  const totalSaidas = tx.filter(x=>x.type==="saida").reduce((s,x)=>s+x.amount,0);
  const saldo = totalEntradas - totalSaidas;

  const totalPoupanca = DATA.patrimonio.poupanca.reduce((s,p)=>s+p.amount,0);
  const totalTesouro = DATA.patrimonio.tesouro.reduce((s,p)=>s+p.amount,0);
  const totalPatrimonio = totalPoupanca + totalTesouro;

  const totalDividas = DATA.dividas.reduce((s,d)=>s+(d.valor||0),0);

  // patrimônio acumulado por mês (para gráfico de evolução simples)
  const patAll = [...DATA.patrimonio.poupanca, ...DATA.patrimonio.tesouro].sort((a,b)=>a.date.localeCompare(b.date));
  let acc = 0;
  const patrimonioSeries = patAll.map(p => { acc += p.amount; return { label: monthLabel(p.date), total: Math.round(acc*100)/100 }; });

  // saídas por categoria
  const catMap = {};
  tx.filter(x=>x.type==="saida").forEach(x=>{ catMap[x.category] = (catMap[x.category]||0)+x.amount; });
  const categoriaSaidas = Object.entries(catMap).map(([name,value])=>({name,value}));

  // entradas vs saídas por mês
  const esMap = {};
  tx.forEach(x=>{
    const k = monthKey(x.date);
    if(!esMap[k]) esMap[k] = {key:k, entradas:0, saidas:0};
    if(x.type==="entrada") esMap[k].entradas += x.amount; else esMap[k].saidas += x.amount;
  });
  const entradaSaidaSeries = Object.values(esMap).sort((a,b)=>a.key.localeCompare(b.key))
    .map(m=>({mes:monthLabel(m.key+"-01"), entradas:Math.round(m.entradas*100)/100, saidas:Math.round(m.saidas*100)/100}));

  // mês atual
  const mesAtual = monthKey(todayISO());
  const entradasMes = tx.filter(x=>x.type==="entrada" && monthKey(x.date)===mesAtual).reduce((s,x)=>s+x.amount,0);
  const saidasMesTodas = tx.filter(x=>x.type==="saida" && monthKey(x.date)===mesAtual).reduce((s,x)=>s+x.amount,0);
  const dizimoMes = tx.filter(x=>x.type==="saida" && monthKey(x.date)===mesAtual && isDizimo(x.category)).reduce((s,x)=>s+x.amount,0);

  // Gastos e entradas zeram a cada novo mês (o filtro por mesAtual acima já garante isso).
  // Mas se o mês anterior fechou no negativo, essa dívida é arrastada como ponto de partida
  // do novo mês, em vez de simplesmente sumir — assim você continua vendo que está devendo.
  const [anoAtualNum, mesAtualNum] = mesAtual.split("-").map(Number);
  const dataMesAnterior = new Date(anoAtualNum, mesAtualNum - 2, 1);
  const mesAnteriorKey = `${dataMesAnterior.getFullYear()}-${String(dataMesAnterior.getMonth()+1).padStart(2,"0")}`;
  const entradasMesAnterior = tx.filter(x=>x.type==="entrada" && monthKey(x.date)===mesAnteriorKey).reduce((s,x)=>s+x.amount,0);
  const saidasMesAnterior = tx.filter(x=>x.type==="saida" && monthKey(x.date)===mesAnteriorKey).reduce((s,x)=>s+x.amount,0);
  const saldoMesAnterior = entradasMesAnterior - saidasMesAnterior;
  const arrasteNegativo = saldoMesAnterior < 0 ? saldoMesAnterior : 0;

  const saldoMes = (entradasMes - saidasMesTodas) + arrasteNegativo;
  const metaPoupanca = entradasMes*0.1;
  const metaDizimo = entradasMes*0.1;
  const aportadoMes = DATA.patrimonio.poupanca.filter(x=>monthKey(x.date)===mesAtual).reduce((s,x)=>s+x.amount,0)
                    + DATA.patrimonio.tesouro.filter(x=>monthKey(x.date)===mesAtual).reduce((s,x)=>s+x.amount,0);
  const okSaldo = entradasMes===0 || saldoMes>=0;
  const okPoupanca = entradasMes===0 || aportadoMes>=metaPoupanca;
  const okDizimo = entradasMes===0 || dizimoMes>=metaDizimo;

  // histórico mensal completo
  const hmMap = {};
  tx.forEach(x=>{
    const k = monthKey(x.date);
    if(!hmMap[k]) hmMap[k] = {entradas:0, saidas:0, dizimo:0};
    if(x.type==="entrada") hmMap[k].entradas += x.amount;
    else { hmMap[k].saidas += x.amount; if(isDizimo(x.category)) hmMap[k].dizimo += x.amount; }
  });
  const patMap = {};
  patAll.forEach(p=>{ const k=monthKey(p.date); patMap[k]=(patMap[k]||0)+p.amount; });
  const allKeys = Array.from(new Set([...Object.keys(hmMap), ...Object.keys(patMap)])).sort();
  let acumulado = 0;
  const historicoMensal = allKeys.map(k=>{
    const m = hmMap[k] || {entradas:0, saidas:0, dizimo:0};
    const aportes = patMap[k]||0;
    acumulado += aportes;
    const s = m.entradas - m.saidas;
    return {
      key:k, mes: monthLabel(k+"-01"), ano:k.slice(0,4),
      entradas: Math.round(m.entradas*100)/100, saidas: Math.round(m.saidas*100)/100,
      saldo: Math.round(s*100)/100, aportes: Math.round(aportes*100)/100, dizimo: Math.round(m.dizimo*100)/100,
      acumuladoPatrimonio: Math.round(acumulado*100)/100,
      pctPoupado: m.entradas>0 ? Math.round((aportes/m.entradas)*1000)/10 : 0,
      pctDizimo: m.entradas>0 ? Math.round((m.dizimo/m.entradas)*1000)/10 : 0,
      pctGasto: m.entradas>0 ? Math.round((m.saidas/m.entradas)*1000)/10 : 0,
    };
  });

  // histórico anual
  const yMap = {};
  historicoMensal.forEach(m=>{
    if(!yMap[m.ano]) yMap[m.ano] = {ano:m.ano, entradas:0, saidas:0, aportes:0, dizimo:0, acumuladoPatrimonio:0};
    yMap[m.ano].entradas += m.entradas; yMap[m.ano].saidas += m.saidas;
    yMap[m.ano].aportes += m.aportes; yMap[m.ano].dizimo += m.dizimo;
    yMap[m.ano].acumuladoPatrimonio = m.acumuladoPatrimonio;
  });
  const yArr = Object.values(yMap).sort((a,b)=>a.ano.localeCompare(b.ano));
  const historicoAnual = yArr.map((y,i)=>{
    const s = y.entradas - y.saidas;
    const prev = yArr[i-1];
    const crescimentoEntradas = prev && prev.entradas>0 ? Math.round(((y.entradas-prev.entradas)/prev.entradas)*1000)/10 : null;
    return { ...y, saldo: Math.round(s*100)/100,
      pctPoupado: y.entradas>0 ? Math.round((y.aportes/y.entradas)*1000)/10 : 0,
      pctDizimo: y.entradas>0 ? Math.round((y.dizimo/y.entradas)*1000)/10 : 0,
      crescimentoEntradas };
  });

  const dizimosRegistrados = tx.filter(x=>x.type==="saida" && isDizimo(x.category)).sort((a,b)=>b.date.localeCompare(a.date));
  const saldosEnviadosPoupanca = DATA.patrimonio.poupanca.filter(p=>p.note==="Saldo do mês enviado").sort((a,b)=>b.date.localeCompare(a.date));

  // dica personalizada
  let dica;
  if (entradasMes===0) dica = "Registre as entradas deste mês para receber uma dica personalizada baseada na sua própria evolução.";
  else if (saldoMes<0) dica = "Este mês fechou negativo. Antes de qualquer novo gasto, revise as categorias em Lançamentos e corte o que for variável (lazer, compras) até o saldo voltar a ficar positivo.";
  else if (aportadoMes<metaPoupanca) dica = `Faltam ${brl(metaPoupanca-aportadoMes)} para completar os 10% de poupança/Tesouro Direto deste mês. Considere usar o botão "Enviar saldo p/ poupança" agora, enquanto o dinheiro ainda está disponível.`;
  else if (dizimoMes<metaDizimo) dica = `Faltam ${brl(metaDizimo-dizimoMes)} para completar os 10% de dízimo deste mês.`;
  else if (totalDividas > totalEntradas*0.3 && totalEntradas>0) dica = "Suas dívidas fixas somam mais de 30% das entradas totais registradas. Priorize quitar a de maior juros antes de assumir novos compromissos, mesmo mantendo poupança e dízimo em dia.";
  else dica = "Você já cumpriu poupança e dízimo este mês — parabéns pela disciplina. Considere direcionar qualquer excedente para o Tesouro Direto, que rende mais que a poupança no longo prazo.";

  return {
    totalEntradas, totalSaidas, saldo, totalPoupanca, totalTesouro, totalPatrimonio, totalDividas,
    patrimonioSeries, categoriaSaidas, entradaSaidaSeries,
    entradasMes, saldoMes, metaPoupanca, metaDizimo, aportadoMes, dizimoMes, okSaldo, okPoupanca, okDizimo, arrasteNegativo,
    historicoMensal, historicoAnual, dizimosRegistrados, saldosEnviadosPoupanca, dica,
  };
}

/* =========================================================
   Render principal
========================================================= */
function render() {
  renderTabs();
  const c = computeAll();
  const main = document.getElementById("main");
  if (TAB === "visao") main.innerHTML = viewVisao(c);
  else if (TAB === "lancamentos") main.innerHTML = viewLancamentos(c);
  else if (TAB === "patrimonio") main.innerHTML = viewPatrimonio(c);
  else if (TAB === "dividas") main.innerHTML = viewDividas(c);
  else if (TAB === "historico") main.innerHTML = viewHistorico(c);
  else if (TAB === "aprenda") main.innerHTML = viewAprenda();

  Object.values(charts).forEach(ch => ch && ch.destroy());
  charts = {};

  if (typeof Chart === "undefined") {
    document.querySelectorAll(".chart-box").forEach(box => {
      box.innerHTML = '<p class="empty-msg">Gráfico indisponível no momento (sem conexão para carregar a biblioteca). Os dados e valores continuam normais nas outras abas.</p>';
    });
    return;
  }
  try {
    if (TAB === "visao") mountVisaoCharts(c);
    if (TAB === "historico") mountHistoricoCharts(c);
  } catch (e) {
    console.error("Erro ao montar gráficos:", e);
  }
}

function chartColors() {
  return {
    line: cssVar('--line'), paperDim: cssVar('--paperDim'), paper: cssVar('--paper'),
    gold: cssVar('--gold'), rust: cssVar('--rust'), green: cssVar('--green'), panel2: cssVar('--panel2'),
  };
}

function mountVisaoCharts(c) {
  const col = chartColors();
  const esCanvas = document.getElementById("chartEntradaSaida");
  if (esCanvas) {
    charts.entradaSaida = new Chart(esCanvas, {
      type: "bar",
      data: {
        labels: c.entradaSaidaSeries.map(m=>m.mes),
        datasets: [
          { label: "Entradas", data: c.entradaSaidaSeries.map(m=>m.entradas), backgroundColor: col.green, borderRadius: 4 },
          { label: "Saídas", data: c.entradaSaidaSeries.map(m=>m.saidas), backgroundColor: col.rust, borderRadius: 4 },
        ]
      },
      options: baseChartOptions(col)
    });
  }
  const patCanvas = document.getElementById("chartPatrimonio");
  if (patCanvas) {
    charts.patrimonio = new Chart(patCanvas, {
      type: "line",
      data: { labels: c.patrimonioSeries.map(p=>p.label), datasets: [{ label:"Patrimônio", data: c.patrimonioSeries.map(p=>p.total), borderColor: col.gold, backgroundColor: col.gold, tension:.3, pointRadius:3 }] },
      options: baseChartOptions(col)
    });
  }
  const catCanvas = document.getElementById("chartCategorias");
  if (catCanvas) {
    const palette = [col.rust, col.gold, col.green, "#6E8B7A", "#8A5A3F", "#D4B04A"];
    charts.categorias = new Chart(catCanvas, {
      type: "pie",
      data: { labels: c.categoriaSaidas.map(x=>x.name), datasets:[{ data: c.categoriaSaidas.map(x=>x.value), backgroundColor: c.categoriaSaidas.map((_,i)=>palette[i%palette.length]) }] },
      options: { plugins:{ legend:{ labels:{ color: col.paperDim, font:{size:11} } } }, maintainAspectRatio:false }
    });
  }
}

function baseChartOptions(col) {
  return {
    maintainAspectRatio:false,
    scales: {
      x: { ticks:{ color: col.paperDim, font:{size:11} }, grid:{ color: col.line } },
      y: { ticks:{ color: col.paperDim, font:{size:11}, callback: v => "R$"+v }, grid:{ color: col.line } },
    },
    plugins: { legend: { labels:{ color: col.paperDim, font:{size:11} } } }
  };
}

  const cEl = document.getElementById("chartHistoricoMensal");
  if (cEl) {
    charts.histMensal = new Chart(cEl, {
      data: {
        labels: hm.map(m=>m.mes),
        datasets: [
          { type:"bar", label:"Entradas", data: hm.map(m=>m.entradas), backgroundColor: col.green, borderRadius:3 },
          { type:"bar", label:"Saídas", data: hm.map(m=>m.saidas), backgroundColor: col.rust, borderRadius:3 },
          { type:"line", label:"Saldo", data: hm.map(m=>m.saldo), borderColor: col.gold, backgroundColor: col.gold, tension:.3, pointRadius:2.5 },
        ]
      },

    });

    charts.histPatrimonio = new Chart(pEl, {
      type:"line",
      data: { labels: hm.map(m=>m.mes), datasets:[{ label:"Patrimônio acumulado", data: hm.map(m=>m.acumuladoPatrimonio), borderColor: col.gold, backgroundColor: "rgba(203,161,53,0.25)", fill:true, tension:.3, pointRadius:2 }] },
      options: baseChartOptions(col)
    });

  if (pctEl) {
    charts.histPct = new Chart(pctEl, {
      type:"line",
      data: {
        labels: hm.map(m=>m.mes),
        datasets: [
          { label:"% Poupado", data: hm.map(m=>m.pctPoupado), borderColor: col.green, tension:.3, pointRadius:2 },

}

/* =========================================================

========================================================= */
function openModal(title, bodyHTML) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHTML;
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal() { document.getElementById("modalOverlay").classList.add("hidden"); }

let currentTxType = "entrada";
function openTxModal(type) {
  currentTxType = type;
  openModal(type==="entrada" ? "Nova entrada" : "Nova despesa", `
    <div class="form-col">
      <label class="field"><span>Descrição</span><input id="f-desc" placeholder="${type==="entrada"?"Ex: Salário SEMED":"Ex: Combustível"}" /></label>
      <label class="field"><span>Categoria</span><input id="f-cat" placeholder="${type==="entrada"?"Ex: Salário, Freela":"Ex: Carro, Mercado, Lazer"}" /></label>
      <div class="grid-2">
        <label class="field"><span>Valor (R$)</span><input id="f-amount" type="number" placeholder="0,00" /></label>
        <label class="field"><span>Data</span><input id="f-date" type="date" value="${todayISO()}" /></label>
      </div>
      <button class="btn ${type==="entrada"?"btn-green":"btn-rust"}" onclick="submitTx()">➕ Adicionar</button>
    </div>
  `);
}
function submitTx() {
  const desc = document.getElementById("f-desc").value;
  const cat = document.getElementById("f-cat").value;
  const amount = parseFloat(document.getElementById("f-amount").value);
  const date = document.getElementById("f-date").value || todayISO();
  if (!desc || !amount) return;
  DATA.transactions.unshift({ id: uid(), type: currentTxType, desc, category: cat || (currentTxType==="entrada"?"Renda":"Outros"), amount, date });
  saveData(); closeModal(); render();
}
function deleteTransaction(id) {
  DATA.transactions = DATA.transactions.filter(x=>x.id!==id);
  saveData(); render();
}

let currentPatKey = "poupanca";
function openPatModal(key) {
  currentPatKey = key;
  openModal(`Novo aporte — ${key==="poupanca"?"Poupança":"Tesouro Direto"}`, `
    <div class="form-col">
      <div class="grid-2">
        <label class="field"><span>Valor (R$)</span><input id="f-amount" type="number" placeholder="0,00" /></label>
        <label class="field"><span>Data</span><input id="f-date" type="date" value="${todayISO()}" /></label>
      </div>
      <label class="field"><span>Observação (opcional)</span><input id="f-note" placeholder="Ex: Rendimento do mês, aporte extra…" /></label>
      <button class="btn btn-gold" onclick="submitPat()">➕ Adicionar aporte</button>

function submitPat() {
  const amount = parseFloat(document.getElementById("f-amount").value);
  const date = document.getElementById("f-date").value || todayISO();
  const note = document.getElementById("f-note").value;
  if (!amount) return;
  DATA.patrimonio[currentPatKey].unshift({ id: uid(), amount, note, date });

}
function deletePatrimonio(tipo, id) {
  DATA.patrimonio[tipo] = DATA.patrimonio[tipo].filter(p=>p.id!==id);
  saveData(); render();
}

function openDividaModal() {
  openModal("Nova dívida / despesa fixa", `
    <div class="form-col">
      <label class="field"><span>Nome</span><input id="f-nome" placeholder="Ex: Cartão de crédito, Financiamento" /></label>
      <label class="field"><span>Tipo</span>
        <select id="f-tipo">
          <option value="carro">Carro</option>
          <option value="compras">Compras do mês</option>
          <option value="outro">Outro</option>
        </select>
      </label>
      <div class="grid-2">
        <label class="field"><span>Valor (R$)</span><input id="f-valor" type="number" placeholder="0,00" /></label>
        <label class="field"><span>Parcelas restantes</span><input id="f-parcelas" type="number" placeholder="0" /></label>
      </div>
      <button class="btn btn-rust" onclick="submitDivida()">➕ Adicionar dívida</button>
    </div>
  `);
}
function submitDivida() {
  const nome = document.getElementById("f-nome").value;
  const tipo = document.getElementById("f-tipo").value;
  const valor = parseFloat(document.getElementById("f-valor").value);
  const parcelasRestantes = parseInt(document.getElementById("f-parcelas").value || "0", 10);
  if (!nome || !valor) return;
  DATA.dividas.push({ id: uid(), nome, tipo, valor, parcelasRestantes, ultimoPagamento: null, ultimaTransacaoId: null });
  saveData(); closeModal(); render();
}
function deleteDivida(id) {
  DATA.dividas = DATA.dividas.filter(x=>x.id!==id);
  saveData(); render();
}
function updateDividaValor(id, valor) {
  DATA.dividas = DATA.dividas.map(x=> x.id===id ? {...x, valor: parseFloat(valor)||0} : x);
  saveData(); render();
}

function showToast(msg) {
  const box = document.getElementById("toastBox");
  if (!box) return;
  const el = document.createElement("div");
  el.textContent = msg;
  el.style.cssText = "background:var(--green,#4F9D69); color:#10241F; font-weight:600; padding:10px 18px; border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,.35); font-size:14px; animation: toastIn .25s ease-out;";
  box.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; setTimeout(()=>el.remove(), 300); }, 2200);
}

function lancarDividaComoDespesa(id) {
  const d = DATA.dividas.find(x=>x.id===id);
  if (!d || !d.valor) return;
  const mk = monthKey(todayISO());
  if (d.ultimoPagamento === mk) return; // já paga este mês, evita duplicar
  const txId = uid();
  DATA.transactions.unshift({ id: txId, type:"saida", desc:d.nome, category:d.nome, amount:d.valor, date: todayISO() });
  d.ultimoPagamento = mk;
  d.ultimaTransacaoId = txId;
  saveData(); render();
  showToast(`✅ "${d.nome}" lançado como saída — ${brl(d.valor)} descontado do saldo`);
}

function desfazerPagamentoDivida(id) {
  const d = DATA.dividas.find(x=>x.id===id);
  if (!d) return;
  if (d.ultimaTransacaoId) {
    DATA.transactions = DATA.transactions.filter(t=>t.id!==d.ultimaTransacaoId);
  }
  d.ultimoPagamento = null;
  d.ultimaTransacaoId = null;
  saveData(); render();
  showToast(`↩️ Pagamento de "${d.nome}" desfeito`);
}

function lancarTodasDespesasFixas() {
  const hoje = todayISO();
  const mk = monthKey(hoje);
  let total = 0, qtd = 0;
  DATA.dividas.forEach(d => {
    if (d.valor > 0 && d.ultimoPagamento !== mk) {
      const txId = uid();
      DATA.transactions.unshift({ id: txId, type:"saida", desc:d.nome, category:d.nome, amount:d.valor, date: hoje });
      d.ultimoPagamento = mk;
      d.ultimaTransacaoId = txId;
      total += d.valor; qtd++;
    }
  });
  saveData(); render();
  if (qtd > 0) showToast(`✅ ${qtd} despesas lançadas — ${brl(total)} descontado do saldo`);
  else showToast(`ℹ️ Todas as dívidas já foram pagas este mês`);
}

  const c = computeAll();
  openModal("Registrar dízimo", `
    <div class="form-col">
      <div class="grid-2">
        <label class="field"><span>Valor (R$)</span><input id="f-amount" type="number" value="${c.metaDizimo ? c.metaDizimo.toFixed(2) : ""}" placeholder="0,00" /></label>

      <button class="btn btn-gold" onclick="submitDizimo()">➕ Confirmar dízimo</button>

  `);

  DATA.transactions.unshift({ id: uid(), type:"saida", desc:"Dízimo", category:"Dízimo", amount, date });

  const c = computeAll();
  openModal("Enviar saldo do mês para poupança", `
    <div class="form-col">
      <div class="grid-2">
        <label class="field"><span>Valor (R$)</span><input id="f-amount" type="number" value="${c.saldoMes>0 ? c.saldoMes.toFixed(2) : ""}" placeholder="0,00" /></label>
        <label class="field"><span>Data</span><input id="f-date" type="date" value="${todayISO()}" /></label>
      </div>
      <p class="hint">Isso lança um aporte de Poupança com a nota "Saldo do mês enviado".</p>
      <button class="btn btn-green" onclick="submitSaldoPoup()">➕ Confirmar envio</button>
    </div>
  `);
}
function submitSaldoPoup() {
  const amount = parseFloat(document.getElementById("f-amount").value);
  const date = document.getElementById("f-date").value || todayISO();
  if (!amount) return;
  DATA.patrimonio.poupanca.unshift({ id: uid(), amount, note:"Saldo do mês enviado", date });
  saveData(); closeModal(); render();
}

/* =========================================================
   Início
========================================================= */
document.documentElement.setAttribute("data-theme", THEME);
renderThemeSwitch();
render();
</script>

<script>
/* =========================================================
   Tela de senha — só a hash SHA-256 fica no código
========================================================= */
(function() {
  const PASSWORD_HASH = "94f91d251f7f2ea8679e29f2dae78ab5fc066713a4fd499e075e0a542421068a"; // sha256
  const UNLOCK_KEY = "livrocaixa:desbloqueado";

  async function sha256Hex(text) {
    const buf = new TextEncoder().encode(text);
    const hashBuf = await crypto.subtle.digest("SHA-256", buf);
    return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  function unlockApp() {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("appRoot").style.display = "";
  }

  // Já desbloqueado nesta sessão (evita pedir senha toda vez que reabre a aba)
  if (sessionStorage.getItem(UNLOCK_KEY) === "1") {
    unlockApp();
  }

  const input = document.getElementById("lockPasswordInput");
  const btn = document.getElementById("lockSubmitBtn");
  const errorMsg = document.getElementById("lockError");

  async function tryUnlock() {
    const value = input.value;
    if (!value) return;
    const hash = await sha256Hex(value);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem(UNLOCK_KEY, "1");
      errorMsg.style.display = "none";
      unlockApp();
    } else {
      errorMsg.style.display = "block";
      input.value = "";
      input.focus();
    }
  }

  btn.addEventListener("click", tryUnlock);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
})();
</script>
